<script>
  (function () {
    // დიდი/შერეული ასოების მისამართები რეალურ ფაილებზე გადავიყვანოთ.
    // ყოფილი ბაგი: '/f1' → replace('/f1') → იგივე 404 → უსასრულო redirect loop.
    // ახლა: სამიზნე ყოველთვის რეალური ფაილია (.html), და raw !== target guard
    // გარანტიას იძლევა, რომ ერთსა და იმავე მისამართზე redirect ვერასდროს მოხდება.
    var raw = location.pathname.replace(/\/+$/, '');
    var p = raw.toLowerCase();
    var target = null;
    // ძველი .html მისამართები ახალ სუფთა URL-ზე გადავამისამართოთ
    if (p === '/f1.html') target = '/f1';
    else if (p === '/ufc.html') target = '/ufc';
    else if (p === '/nba.html') target = '/nba';
    else if (p === '/index' || p === '/index.html') target = '/';
    if (target && raw !== target) location.replace(target);
  })();
</script>
